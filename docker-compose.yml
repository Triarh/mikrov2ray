services:
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/xray-config.json:/etc/xray/config.json:ro

  mikrov2ray:
    image: triarh1/mikrov2ray:latest
    container_name: mikrov2ray
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - xray
